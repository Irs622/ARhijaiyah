<!DOCTYPE html>
<html lang="id" dir="ltr">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0f0f1a" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

  <!-- SEO -->
  <title>AR Hijaiyah — Belajar Huruf Arab dengan Augmented Reality</title>
  <meta name="description"
    content="Aplikasi WebAR interaktif untuk belajar huruf hijaiyah menggunakan kamera ponsel. Deteksi kartu huruf dan bangun kata Arab secara nyata." />

  <!-- PWA Manifest -->
  <link rel="manifest" href="/manifest.json" />

  <!-- Preconnect for performance -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet" />

  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --c-bg: #0f0f1a;
      --c-primary: #7c5cfc;
      --c-success: #22c55e;
      --c-fail: #ef4444;
      --c-text: #f0f0ff;
      --c-muted: #6b7280;
      --radius: 12px;
      --font: 'Outfit', sans-serif;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--c-bg);
      font-family: var(--font);
      color: var(--c-text);
      -webkit-tap-highlight-color: transparent;
    }

    /* ── AR Container ─────────────────────────── */
    #ar-container {
      position: fixed;
      inset: 0;
      z-index: 0;
    }

    #ar-container canvas {
      position: absolute;
      inset: 0;
      width: 100% !important;
      height: 100% !important;
    }

    /* ── HUD Root ─────────────────────────────── */
    #hud-root {
      position: fixed;
      inset: 0;
      z-index: 10;
      pointer-events: none;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 24px 16px 40px;
    }

    /* ── Status Bar ───────────────────────────── */
    #hud-status {
      align-self: center;
      background: rgba(15, 15, 26, 0.75);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(124, 92, 252, 0.3);
      border-radius: 999px;
      padding: 10px 20px;
      font-size: 14px;
      font-weight: 600;
      color: var(--c-text);
      text-align: center;
      max-width: 320px;
      transition: opacity 0.3s ease;
    }

    /* ── Scan Overlay Corners ─────────────────── */
    #hud-scan-overlay {
      position: absolute;
      inset: 0;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.4s ease;
    }

    #hud-scan-overlay.visible {
      opacity: 1;
    }

    #hud-scan-overlay::before,
    #hud-scan-overlay::after {
      content: '';
      position: absolute;
      width: 60px;
      height: 60px;
      border-color: var(--c-primary);
      border-style: solid;
      border-width: 0;
    }

    #hud-scan-overlay::before {
      top: 20%;
      left: 10%;
      border-top-width: 3px;
      border-left-width: 3px;
      border-radius: 4px 0 0 0;
    }

    #hud-scan-overlay::after {
      bottom: 20%;
      right: 10%;
      border-bottom-width: 3px;
      border-right-width: 3px;
      border-radius: 0 0 4px 0;
    }

    /* ── Word Panel ───────────────────────────── */
    #hud-word-panel {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      opacity: 0;
      transform: translateY(20px);
      transition: opacity 0.3s ease, transform 0.3s ease;
      pointer-events: auto;
    }

    #hud-word-panel.visible {
      opacity: 1;
      transform: translateY(0);
    }

    /* ── Word Strip ───────────────────────────── */
    #word-strip {
      display: flex;
      flex-direction: row-reverse;
      /* RTL: Arabic letters right-to-left */
      gap: 8px;
      min-height: 72px;
      align-items: center;
      justify-content: center;
      background: rgba(15, 15, 26, 0.85);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(124, 92, 252, 0.25);
      border-radius: var(--radius);
      padding: 12px 16px;
      width: 100%;
      max-width: 360px;
      transition: box-shadow 0.3s ease;
    }

    #word-strip.strip--success {
      box-shadow: 0 0 24px rgba(34, 197, 94, 0.5);
      border-color: var(--c-success);
    }

    .strip-letter {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      animation: popIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }

    .strip-letter__arabic {
      font-size: 32px;
      line-height: 1;
    }

    .strip-letter__name {
      font-size: 10px;
      color: var(--c-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .strip-word-success {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      animation: popIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }

    .strip-word-success__arabic {
      font-size: 36px;
      color: var(--c-success);
      direction: rtl;
    }

    .strip-word-success__translation {
      font-size: 14px;
      color: var(--c-muted);
    }

    /* ── Reset Button ─────────────────────────── */
    #hud-reset-btn {
      pointer-events: auto;
      background: rgba(239, 68, 68, 0.15);
      border: 1px solid rgba(239, 68, 68, 0.4);
      border-radius: 999px;
      color: #fca5a5;
      font-family: var(--font);
      font-size: 13px;
      font-weight: 600;
      padding: 8px 20px;
      cursor: pointer;
      transition: background 0.2s ease, transform 0.1s ease;
      min-width: 48px;
      min-height: 48px;
    }

    #hud-reset-btn:active {
      background: rgba(239, 68, 68, 0.3);
      transform: scale(0.96);
    }

    /* ── Feedback Overlay ─────────────────────── */
    #feedback-overlay {
      position: fixed;
      inset: 0;
      z-index: 20;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.15s ease;
    }

    /* ── Floating 3D Card ─────────────────────── */
    #hud-3d-card {
      position: fixed;
      top: 15%;
      left: 50%;
      transform: translate(-50%, -20px);
      width: 90%;
      max-width: 380px;
      height: 38%;
      max-height: 320px;
      z-index: 12;
      background: rgba(15, 15, 26, 0.65);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(124, 92, 252, 0.25);
      border-radius: 20px;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(255, 255, 255, 0.05) inset;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s cubic-bezier(0.16, 1, 0.3, 1), transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }

    #hud-3d-card.visible {
      opacity: 1;
      pointer-events: auto;
      transform: translate(-50%, 0);
    }

    #interactive-3d-canvas-container {
      flex: 1;
      width: 100%;
      height: 100%;
      position: relative;
    }

    .card-instruction {
      font-size: 11px;
      font-weight: 600;
      color: rgba(240, 240, 255, 0.6);
      text-align: center;
      padding-bottom: 12px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      pointer-events: none;
    }

    #feedback-overlay.overlay--success {
      background: rgba(34, 197, 94, 0.18);
      opacity: 1;
      animation: flashOut 0.8s ease forwards;
    }

    #feedback-overlay.overlay--fail {
      background: rgba(239, 68, 68, 0.2);
      opacity: 1;
      animation: shakeOut 0.6s ease forwards;
    }

    #feedback-overlay.overlay--detect {
      background: rgba(124, 92, 252, 0.1);
      opacity: 1;
      animation: flashOut 0.2s ease forwards;
    }

    /* ── Error Screen ─────────────────────────── */
    #error-screen {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 99;
      background: var(--c-bg);
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 32px;
      font-size: 16px;
      color: #fca5a5;
    }

    #error-screen:not(:empty) {
      display: flex;
    }

    /* ── Loading Screen ───────────────────────── */
    #loading-screen {
      position: fixed;
      inset: 0;
      z-index: 50;
      background: var(--c-bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      transition: opacity 0.5s ease;
    }

    #loading-screen.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .loader-title {
      font-size: 24px;
      font-weight: 700;
      background: linear-gradient(135deg, #7c5cfc, #a78bfa);
      background-clip: text;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .loader-arabic {
      font-size: 48px;
      animation: pulse 1.5s ease-in-out infinite;
    }

    .loader-subtitle {
      font-size: 13px;
      color: var(--c-muted);
    }

    /* ── Keyframes ────────────────────────────── */
    @keyframes popIn {
      from {
        opacity: 0;
        transform: scale(0.6);
      }

      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    @keyframes flashOut {
      0% {
        opacity: 1;
      }

      100% {
        opacity: 0;
      }
    }

    @keyframes shakeOut {

      0%,
      100% {
        transform: translateX(0);
        opacity: 1;
      }

      20% {
        transform: translateX(-8px);
      }

      40% {
        transform: translateX(8px);
      }

      60% {
        transform: translateX(-6px);
      }

      80% {
        transform: translateX(6px);
      }
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1;
        transform: scale(1);
      }

      50% {
        opacity: 0.6;
        transform: scale(0.95);
      }
    }
  </style>
</head>

<body>

  <!-- Loading Screen -->
  <div id="loading-screen">
    <div class="loader-arabic">ب</div>
    <div class="loader-title">AR Hijaiyah</div>
    <div class="loader-subtitle">Memuat sistem AR…</div>
  </div>

  <!-- Error Screen (shown only if WebGL2 unavailable) -->
  <div id="error-screen"></div>

  <!-- AR Viewport -->
  <div id="ar-container"></div>

  <!-- HUD Layer -->
  <div id="hud-root">
    <!-- Status pill -->
    <div id="hud-status">Memuat…</div>

    <!-- Scan corner overlay -->
    <div id="hud-scan-overlay"></div>

    <!-- Bottom word panel -->
    <div id="hud-word-panel">
      <div id="word-strip"></div>
      <button id="hud-reset-btn" aria-label="Reset kata">↺ Ulangi</button>
    </div>
  </div>

  <!-- Floating 3D Card for Interactive Viewer -->
  <div id="hud-3d-card">
    <div id="interactive-3d-canvas-container"></div>
    <div class="card-instruction">Sentuh & geser untuk memutar 3D! 👆</div>
  </div>

  <!-- Fullscreen feedback flash layer -->
  <div id="feedback-overlay" aria-hidden="true"></div>

  <!-- App Entry Point -->
  <script type="module" src="/app/main.ts"></script>

  <!-- Hide loading screen once app is ready -->
  <script type="module">
    import { eventBus } from '/app/core/EventBus.ts';
    eventBus.on('app:ready', () => {
      const ls = document.getElementById('loading-screen');
      if (ls) ls.classList.add('hidden');
    });
  </script>

</body>

</html>
